<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视觉 AI 面试题卡</title>
  <meta name="description" content="面向视觉 AI 算法工程师的面试问答卡片页，支持搜索、分类筛选与弹窗查看完整答案。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Visual AI Interview Deck</p>
        <h1>视觉 AI 面试题卡</h1>
        <p class="hero-text">首页只看问题摘要，点击卡片弹出完整答案。长代码、长公式和长解释都放到详情层里看，PC 和手机都会舒服很多。</p>
      </div>
      <div class="hero-actions">
        <button id="search-toggle" class="search-toggle" type="button" aria-expanded="false" aria-controls="search-panel">搜索</button>
      </div>
    </header>

    <section id="search-panel" class="search-panel hidden">
      <label class="search-box" for="search-input">
        <span class="search-label">搜索问题 / 关键词 / 标签</span>
        <input id="search-input" type="search" placeholder="例如：PyTorch、BatchNorm、Softmax..." autocomplete="off">
      </label>
    </section>

    <section class="filter-panel">
      <div class="filter-header">
        <span class="search-label">分类筛选</span>
        <button id="clear-filter" class="clear-filter hidden" type="button">清除筛选</button>
      </div>
      <div id="category-filter-list" class="filter-list"></div>
    </section>

    <main>
      <section id="empty-state" class="empty-state hidden">
        <h2>没有匹配结果</h2>
        <p>换个关键词或分类试试。</p>
      </section>

      <section id="card-grid" class="card-grid" aria-live="polite"></section>
    </main>
  </div>

  <template id="card-template">
    <article class="qa-card" tabindex="0">
      <div class="card-shell">
        <div class="card-meta">
          <span class="card-date"></span>
          <button class="card-category" type="button"></button>
        </div>
        <h2 class="card-question"></h2>
        <p class="card-preview"></p>
        <div class="card-tags"></div>
        <p class="card-hint">点击查看完整答案</p>
      </div>
    </article>
  </template>

  <div id="detail-modal" class="detail-modal hidden" aria-hidden="true">
    <div class="detail-backdrop" data-close="true"></div>
    <section class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <div class="detail-header">
        <div class="detail-meta">
          <span id="detail-date" class="detail-date"></span>
          <button id="detail-category" class="detail-category" type="button"></button>
        </div>
        <button id="detail-close" class="detail-close" type="button" aria-label="关闭">关闭</button>
      </div>
      <h2 id="detail-title" class="detail-title"></h2>
      <div id="detail-tags" class="detail-tags"></div>
      <div id="detail-answer" class="detail-answer"></div>
    </section>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
