<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视觉 AI 面试题卡</title>
  <meta name="description" content="面向视觉 AI 算法工程师的面试问答卡片页，支持翻转查看答案与快速搜索。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Visual AI Interview Deck</p>
        <h1>视觉 AI 面试题卡</h1>
        <p class="hero-text">围绕 Python、深度学习、计算机视觉和 AIGC 的高频问题整理。首页默认按最近更新时间展示，点击卡片翻到答案。</p>
      </div>
      <div class="hero-actions">
        <button id="search-toggle" class="search-toggle" type="button" aria-expanded="false" aria-controls="search-panel">搜索</button>
      </div>
    </header>

    <section id="search-panel" class="search-panel hidden">
      <label class="search-box" for="search-input">
        <span class="search-label">搜索问题 / 关键词 / 标签</span>
        <input id="search-input" type="search" placeholder="例如：PyTorch、BatchNorm、扩散模型..." autocomplete="off">
      </label>
    </section>

    <main>
      <section id="empty-state" class="empty-state hidden">
        <h2>没有匹配结果</h2>
        <p>换个关键词试试。</p>
      </section>

      <section id="card-grid" class="card-grid" aria-live="polite"></section>
    </main>
  </div>

  <template id="card-template">
    <article class="qa-card" tabindex="0">
      <div class="qa-card-inner">
        <div class="qa-card-face qa-card-front">
          <div class="card-meta">
            <span class="card-date"></span>
            <span class="card-category"></span>
          </div>
          <h2 class="card-question"></h2>
          <div class="card-tags"></div>
          <p class="card-hint">点击查看答案</p>
        </div>
        <div class="qa-card-face qa-card-back">
          <div class="card-meta">
            <span class="card-date"></span>
            <span class="card-category"></span>
          </div>
          <div class="card-answer"></div>
          <p class="card-hint">再次点击返回问题</p>
        </div>
      </div>
    </article>
  </template>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
